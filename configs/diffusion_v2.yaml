diffusion_v2:
  inpaint_model: runwayml/stable-diffusion-inpainting
  source_filter:
    max_mask_coverage: 0.07
    max_internal_rectangle_score: 0.025
    max_vertical_seam_score: 20.0
    min_box_max_side_px: 8
    max_box_max_side_px: 90
    max_ui_rectangle_score: 0.006
    max_box_area_ratio: 0.02
    max_inset_window_score: 0.055
  prompt:
    positive: photorealistic low-light night version of the same drone image, same
      camera viewpoint, same scene layout, same horizon, same ground geometry, same
      trees, same road, same sky structure, natural dark blue low-light illumination,
      subtle sensor noise, reduced visibility, no new objects, no interface, no inset
      image, no split screen
    negative: different landscape, city skyline, satellite map, aerial city lights,
      star field, mars landscape, space, planet, moon surface, surveillance interface,
      HUD, screen overlay, picture-in-picture, inset image, split screen, frame, border,
      text, watermark, extra drone, duplicated drone, airplane, bird, object hallucination,
      bright square, blue square, rectangular halo, glowing patch around object, cartoon,
      CGI, surreal, unrealistic, low quality, distorted object
  presets:
    conservative:
      strength: 0.35
      guidance_scale: 4.5
      steps: 25
      condition_margin_px: 2
      strict_object_margin_px: 4
      protection_margin_px: 8
      blend_margin_px: 14
      mask_blur_px: 5
      condition_strength: 0.9
    medium:
      strength: 0.45
      guidance_scale: 5.5
      steps: 28
      condition_margin_px: 3
      strict_object_margin_px: 6
      protection_margin_px: 10
      blend_margin_px: 18
      mask_blur_px: 7
      condition_strength: 0.92
    strong:
      strength: 0.55
      guidance_scale: 6.5
      steps: 30
      condition_margin_px: 4
      strict_object_margin_px: 8
      protection_margin_px: 12
      blend_margin_px: 22
      mask_blur_px: 9
      condition_strength: 0.95
  quality_gate:
    min_background_diff: 6.0
    max_object_diff: 18.0
    max_mask_coverage: 0.22
    reject_black_images: true
