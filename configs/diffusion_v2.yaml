diffusion_v2:
  img2img_model: runwayml/stable-diffusion-v1-5
  source_filter:
    max_mask_coverage: 0.11
    max_internal_rectangle_score: 0.045
    max_ui_rectangle_score: 0.014
    max_inset_window_score: 0.18
    max_vertical_seam_score: 28.0
    min_box_max_side_px: 7
    max_box_max_side_px: 130
    max_box_area_ratio: 0.04
  prompt:
    positive: same drone scene at night, same viewpoint, same geometry, dark blue
      low light, realistic moonlight, subtle sensor noise, photorealistic, no new
      objects
    negative: extra drone, duplicated drone, airplane, bird, inset image, split screen,
      hud, screen overlay, text, watermark, city skyline, satellite map, star field,
      space, mars, halo, blue square, cartoon, cgi
  presets:
    conservative:
      img2img_strength: 0.28
      guidance_scale: 4.5
      steps: 24
      darkness: 0.8
      feather_px: 4
      ring_inner_px: 2
      ring_outer_px: 8
      relight_strength: 0.18
    medium:
      img2img_strength: 0.38
      guidance_scale: 5.5
      steps: 28
      darkness: 0.88
      feather_px: 6
      ring_inner_px: 3
      ring_outer_px: 10
      relight_strength: 0.28
  quality_gate:
    min_background_diff: 6.0
    max_object_diff: 95.0
    max_halo_score: 50.0
    reject_black_images: true
