models:
  img2img: runwayml/stable-diffusion-v1-5
  inpaint: runwayml/stable-diffusion-inpainting

device:
  preference: auto
  allow_mps: true
  allow_cuda: true
  allow_cpu: true

generation:
  subset_size: 20
  default_seed: 42
  modes:
    - global_img2img
    - background_inpaint_protected_box
    - background_inpaint_reinsert_object
  strength_values:
    - 0.2
    - 0.35
    - 0.5
    - 0.65
  guidance_values:
    - 3.0
    - 5.0
    - 7.5
    - 10.0
    - 12.0

paths:
  source_yolo_dir: data/yolo
  output_root: data/synthetic/diffusion_grid
  preview_dir: data/previews/diffusion

prompts:
  presets:
    - night_lowlight
    - night_cloudy
    - foggy_morning
  negative_prompt: "extra drone, duplicated drone, missing drone, deformed drone, changed object position, text, watermark, logo, strong blur on the main drone object, distorted bounding box, cartoon, painting"

masks:
  pixel_margin: 16
  relative_margin: 0.15

filtering:
  min_box_iou_placeholder: 0.85
  max_clip_distance_placeholder: null
  manual_review_required: true
